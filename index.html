<!doctype html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Cardona — Asesoría Financiera IA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet">

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#06edf9",
            dark: "#050a0a",
          },
          fontFamily: {
            display: ["Montserrat", "sans-serif"],
            sans: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% -10%, #0d2e30 0%, #050a0a 60%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .glass:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(6,237,249,0.3);
    }

    .btn-primary-wrap {
      position: relative;
      border-radius: 0.875rem;
      padding: 1px;
      background: linear-gradient(135deg, rgba(6,237,249,0.5), #06edf9, rgba(6,237,249,0.5));
    }
    .btn-primary-wrap::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 1rem;
      background: linear-gradient(135deg, rgba(6,237,249,0.2), transparent, rgba(6,237,249,0.2));
      filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }
    .btn-primary-wrap:hover::after { opacity: 1; }

    .btn-primary-inner {
      background: #050a0a;
      border-radius: calc(0.875rem - 1px);
      transition: background 0.2s ease;
    }
    .btn-primary-wrap:hover .btn-primary-inner {
      background: rgba(6,237,249,0.1);
    }

    .orb {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse-orb 8s ease-in-out infinite alternate;
    }
    @keyframes pulse-orb {
      from { opacity: 0.3; transform: scale(1); }
      to   { opacity: 0.6; transform: scale(1.15); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.7s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.4s; }
    .delay-4 { animation-delay: 0.55s; }
    .delay-5 { animation-delay: 0.7s; }

    .hr-glow {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(6,237,249,0.35), transparent);
    }

    .icon-circle {
      width: 48px; height: 48px;
      border-radius: 9999px;
      background: rgba(6,237,249,0.1);
      display: flex; align-items: center; justify-content: center;
      color: #06edf9;
      flex-shrink: 0;
    }
    .icon-circle-primary {
      background: #06edf9;
      color: #050a0a;
      position: relative;
    }
    .icon-circle-primary::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 9999px;
      border: 1px solid rgba(6,237,249,0.4);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 0;   transform: scale(1.4); }
    }

    .logo-wrap { position: relative; overflow: hidden; }
    .logo-wrap::after {
      content: "";
      position: absolute;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(6,237,249,0.6), transparent);
      top: -10%;
      animation: scan 4s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { top: -10%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 110%; opacity: 0; }
    }

    /* Modal */
    #widgetModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5,10,10,0.88);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }
    #widgetModal.open { display: flex; }

    .modal-box {
      background: #091515;
      border: 1px solid rgba(6,237,249,0.2);
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fade-up 0.3s ease both;
    }

    #danielWidget {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    a { text-decoration: none; }
  </style>
</head>

<body class="text-slate-100 font-sans relative overflow-x-hidden">

    </main>

    <!-- FOOTER -->

        <span class="text-[9px] font-display tracking-[0.35em] uppercase">Intelligence</span>
      </div>
      <div class="hr-glow w-10"></div>
      <p class="text-[9px] text-slate-700 uppercase tracking-widest font-light">
        © 2025 Daniel Cardona • Pro System v3.0

    </footer>

  </div>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
